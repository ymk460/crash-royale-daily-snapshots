name: Collect leaderboard decks

on:
  schedule:
    # 毎日 01:00 JST (UTC+9) = 16:00 UTC
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Top N players
        required: false
        default: "100"
      date:
        description: YYYYMMDD (empty = today JST)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect decks
        env:
          CR_TOKEN: ${{ secrets.CR_TOKEN }}
          PLAYER_LIMIT: ${{ github.event.inputs.limit || '100' }}
          SNAPSHOT_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          ARGS="--limit ${PLAYER_LIMIT} --output-dir docs"
          if [ -n "${SNAPSHOT_DATE}" ]; then
            ARGS="$ARGS --date ${SNAPSHOT_DATE}"
          fi
          python3 scripts/collect_leaderboard_decks.py $ARGS

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily deck snapshot $(date -u +%Y%m%d)"
          git push
